version: '3'

vars:
  API_URL: http://localhost:5048
  POD2_URL: http://localhost:5049
  HTTP_FILE: src/IdempotencyKey.WebApi.http
  API_PID_FILE: .api.pid
  POD2_PID_FILE: .api2.pid

tasks:
  test:all:
    desc: 啟動容器 → 初始化 → 建置 → 啟動 Pod1 + Pod2 → 執行所有測試 → 清除（一鍵完整執行）
    cmds:
      - task: docker:up
      - task: data:init
      - task: api:build
      - task: api:start
      - task: api:start-pod2
      - defer: { task: api:stop }
      - defer: { task: api:stop-pod2 }
      - defer: { task: docker:down }
      - task: api:wait
      - task: api:wait-pod2
      - cmd: |
          echo ""
          echo "══════════════════════════════════════════════════════════════════"
          echo "  [1/2] 功能測試（httpyac .http）"
          echo "        CRUD 會員 + 冪等鍵單 pod 情境"
          echo "══════════════════════════════════════════════════════════════════"
      - task: data:clean
      - task: test
      - cmd: |
          echo ""
          echo "══════════════════════════════════════════════════════════════════"
          echo "  [2/2] 分散式鎖測試（兩個 pod 並發）"
          echo "        場景 A：相同 key 不同 payload"
          echo "        場景 B：相同 key 相同 payload + 重播"
          echo "══════════════════════════════════════════════════════════════════"
      - task: data:clean
      - task: test:distributed
      - cmd: |
          echo ""
          echo "══════════════════════════════════════════════════════════════════"
          echo "  ✅ 全部測試完成"
          echo "══════════════════════════════════════════════════════════════════"

  data:init:
    desc: 還原套件並執行 EF Core 資料庫遷移（初始化結構）
    dir: src
    cmds:
      - task: api:restore
      - dotnet ef database update

  data:clean:
    desc: 清除測試資料（截斷 Members 資料表 + 刪除 Redis idempotency keys）
    cmds:
      - cmd: |
          docker exec idempotency-postgres \
            psql -U postgres -d member -c 'TRUNCATE "Members" RESTART IDENTITY CASCADE;'
          echo "PostgreSQL Members 已清除"
      - cmd: |
          KEY_COUNT=$(docker exec idempotency-redis \
            redis-cli -p 6379 --scan --pattern 'idempotency:*' | wc -l)
          if [ "$KEY_COUNT" -gt 0 ]; then
            docker exec idempotency-redis \
              redis-cli -p 6379 --scan --pattern 'idempotency:*' | \
              xargs docker exec -i idempotency-redis redis-cli -p 6379 DEL
          fi
          echo "Redis idempotency keys 已清除（共 $KEY_COUNT 個）"

  docker:up:
    desc: 啟動 PostgreSQL 與 Redis 容器並等待健康檢查通過，同時建置專案
    cmds:
      - task: api:build
      - docker compose up -d
      - echo "等待容器健康..."
      - >
        until docker compose ps | grep "idempotency-postgres" | grep -q "healthy"; do
          sleep 2;
        done
      - echo "PostgreSQL 已就緒"

  docker:down:
    desc: 停止並移除容器與 Volume
    cmds:
      - docker compose down -v
      - echo "容器已清除"

  api:restore:
    desc: 還原 NuGet 套件
    dir: src
    cmds:
      - dotnet restore

  api:build:
    desc: 建置 API 專案（兩個 pod 啟動前須先建置，避免並行 build 競爭）
    dir: src
    cmds:
      - task: api:restore
      - dotnet build --no-incremental -c Debug -v minimal

  api:start:
    desc: 在背景啟動 Pod1（port 5048，--no-build）
    cmds:
      - task: api:stop
      - |
        dotnet run --project src --no-build --urls http://localhost:5048 > .api.log 2>&1 &
        echo $! > {{.API_PID_FILE}}
        echo "Pod1 啟動中（PID: $(cat {{.API_PID_FILE}})）"

  api:start-pod2:
    desc: 在背景啟動 Pod2（port 5049，--no-build，模擬多 pod 部署），共用同一個 Redis
    cmds:
      - task: api:stop-pod2
      - |
        dotnet run --project src --no-build --urls http://localhost:5049 > .api2.log 2>&1 &
        echo $! > {{.POD2_PID_FILE}}
        echo "Pod2 啟動中（PID: $(cat {{.POD2_PID_FILE}})）"

  api:wait:
    desc: 等待 Pod1 回應健康
    cmds:
      - |
        echo "等待 Pod1 就緒..."
        for i in $(seq 1 30); do
          if curl -sf {{.API_URL}}/api/members > /dev/null 2>&1; then
            echo "Pod1 已就緒"
            exit 0
          fi
          sleep 1
        done
        echo "Pod1 啟動超時" && exit 1

  api:wait-pod2:
    desc: 等待 Pod2 回應健康
    cmds:
      - |
        echo "等待 Pod2 就緒..."
        for i in $(seq 1 30); do
          if curl -sf {{.POD2_URL}}/api/members > /dev/null 2>&1; then
            echo "Pod2 已就緒"
            exit 0
          fi
          sleep 1
        done
        echo "Pod2 啟動超時" && exit 1

  api:stop:
    desc: 停止 Pod1
    cmds:
      - |
        if [ -f {{.API_PID_FILE}} ]; then
          PID=$(cat {{.API_PID_FILE}})
          kill $PID 2>/dev/null && echo "Pod1 已停止（PID: $PID）" || true
          rm -f {{.API_PID_FILE}}
        fi

  api:stop-pod2:
    desc: 停止 Pod2
    cmds:
      - |
        if [ -f {{.POD2_PID_FILE}} ]; then
          PID=$(cat {{.POD2_PID_FILE}})
          kill $PID 2>/dev/null && echo "Pod2 已停止（PID: $PID）" || true
          rm -f {{.POD2_PID_FILE}}
        fi

  test:
    desc: 執行 .http 檔案的 API 測試
    cmds:
      - npx --yes httpyac send {{.HTTP_FILE}} --all --output short

  test:stress:all:
    desc: 啟動容器 → 初始化 → 建置 → 啟動 Pod1 + Pod2 → 執行壓測 → 清除（一鍵完整執行）
    cmds:
      - task: docker:up
      - task: data:init
      - task: api:build
      - task: api:start
      - task: api:start-pod2
      - defer: { task: api:stop }
      - defer: { task: api:stop-pod2 }
      - defer: { task: docker:down }
      - task: api:wait
      - task: api:wait-pod2
      - task: data:clean
      - task: test:stress

  test:stress:
    desc: |
      50 RPS 壓力測試（需先啟動 Pod1 + Pod2）
      以相同 Idempotency-Key 同時打兩個 Pod，驗證：
        1. 不重複寫入（全部請求最多只創建 1 筆 Member）
        2. 回應碼分佈正常（201 / 409 InProgress / 201 Replay）
        3. 高並發下有機會觸發 UpdateRecordAsync 的 TOCTOU 競爭條件
    cmds:
      - cmd: |
          KEY="stress-$(date +%s)"
          R=$RANDOM
          PAYLOAD="{\"name\":\"StressMember-$R\",\"email\":\"stress-$R@test.com\"}"
          TOTAL=100
          RATE_INTERVAL=0.02

          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║  50 RPS 壓力測試                                                 ║"
          printf "║  Key   : %-55s║\n" "$KEY"
          printf "║  請求數  : %-4s（50 RPS × 2s，交替送往 Pod1 / Pod2）         ║\n" "$TOTAL"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""

          rm -f /tmp/stress_*.json /tmp/stress_*.code

          for i in $(seq 1 $TOTAL); do
            if [ $((i % 2)) -eq 0 ]; then
              TARGET="{{.API_URL}}"
            else
              TARGET="{{.POD2_URL}}"
            fi
            curl -s \
              -o /tmp/stress_$i.json \
              -w "%{http_code}" \
              -X POST $TARGET/api/members \
              -H "Content-Type: application/json" \
              -H "Idempotency-Key: $KEY" \
              -d "$PAYLOAD" > /tmp/stress_$i.code 2>&1 &
            sleep $RATE_INTERVAL
          done

          echo "等待所有請求完成..."
          wait || true
          echo ""

          C201=0; C409=0; C422=0; COTHER=0
          MEMBER_IDS=""

          for i in $(seq 1 $TOTAL); do
            CODE=$(cat /tmp/stress_$i.code 2>/dev/null | tr -d '[:space:]')
            BODY=$(cat /tmp/stress_$i.json 2>/dev/null)
            case "$CODE" in
              201)
                C201=$((C201+1))
                ID=$(echo "$BODY" | grep -oi '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
                if [ -n "$ID" ]; then MEMBER_IDS="$MEMBER_IDS $ID"; fi
                ;;
              409) C409=$((C409+1)) ;;
              422) C422=$((C422+1)) ;;
              *)   COTHER=$((COTHER+1)); echo "  [WARN] 請求 $i → HTTP $CODE: $BODY" ;;
            esac
          done

          UNIQUE_IDS=$(echo "$MEMBER_IDS" | tr ' ' '\n' | sort -u | awk 'NF{c++} END{print c+0}')

          echo "══════════════════════════════════════════════════════════════════"
          echo "  統計結果（共 $TOTAL 個請求）"
          echo "══════════════════════════════════════════════════════════════════"
          echo "  HTTP 201（創建 / Replay） : $C201"
          echo "  HTTP 409（InProgress 衝突）: $C409"
          echo "  HTTP 422（Fingerprint 不符）: $C422"
          echo "  其他                        : $COTHER"
          echo ""
          echo "  唯一 Member ID 數: $UNIQUE_IDS"
          echo ""

          REDIS_STATE=$(docker exec idempotency-redis redis-cli get "idempotency:$KEY" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'status={d[\"status\"]}, responseStatusCode={d.get(\"responseStatusCode\",\"N/A\")}')" 2>/dev/null \
            || echo "無法取得")
          echo "  Redis Key 最終狀態: $REDIS_STATE"
          echo ""

          FAIL=0
          if [ "$UNIQUE_IDS" -gt 1 ]; then
            echo "  ❌ FAIL：發現 $UNIQUE_IDS 個不同 Member ID → 資料重複寫入！"
            FAIL=1
          fi
          if [ "$C201" -eq 0 ]; then
            echo "  ❌ FAIL：沒有任何請求成功（201 = 0）"
            FAIL=1
          fi
          if [ "$C422" -gt 0 ]; then
            echo "  ⚠️  WARNING：出現 $C422 個 422 Fingerprint Mismatch"
            echo "     → 可能是 TOCTOU 競爭條件造成 Key 狀態被異常覆寫"
          fi
          if [ "$COTHER" -gt 0 ]; then
            echo "  ❌ FAIL：出現 $COTHER 個非預期回應碼"
            FAIL=1
          fi

          if [ "$FAIL" -eq 0 ]; then
            echo "  ✅ PASS：$TOTAL 個請求中只有 1 筆 Member 被創建，冪等性正常"
          else
            exit 1
          fi

  test:distributed:
    desc: 分散式鎖整合測試（需先啟動 Pod1 + Pod2）
    cmds:
      - task: test:distributed:diff-payload
      - task: test:distributed:same-payload

  test:distributed:diff-payload:
    desc: |
      場景 A：相同 key、不同 payload，同時打兩個 pod
      預期：兩個 pod 不能同時都是 201（Redis SET NX 確保只有一個成功取鎖）
      ・先取鎖者：201
      ・後到者：409（InProgress 衝突）
      ・完成後用同 key 但不同 payload 重試：422（fingerprint mismatch）
    cmds:
      - |
        KEY="dist-diff-$(date +%s)"
        R=$RANDOM
        PAYLOAD_A="{\"name\":\"Alice-A-$R\",\"email\":\"alice-diff-$R@test.com\"}"
        PAYLOAD_B="{\"name\":\"Bob-B-$R\",\"email\":\"bob-diff-$R@test.com\"}"

        echo ""
        echo "╔══════════════════════════════════════════════════════════════════╗"
        echo "║  場景 A：相同 key「$KEY」                                        ║"
        echo "║         不同 payload，同時打兩個 pod                              ║"
        echo "╚══════════════════════════════════════════════════════════════════╝"
        echo "  Pod1 → {{.API_URL}}  payload: $PAYLOAD_A"
        echo "  Pod2 → {{.POD2_URL}} payload: $PAYLOAD_B"
        echo ""

        # 同時發送（& 背景執行）
        curl -s -o /tmp/dist_pod1.json -w "%{http_code}" \
          -X POST {{.API_URL}}/api/members \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $KEY" \
          -d "$PAYLOAD_A" > /tmp/dist_pod1.code &
        PID1=$!

        curl -s -o /tmp/dist_pod2.json -w "%{http_code}" \
          -X POST {{.POD2_URL}}/api/members \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $KEY" \
          -d "$PAYLOAD_B" > /tmp/dist_pod2.code &
        PID2=$!

        wait $PID1 $PID2

        POD1_CODE=$(cat /tmp/dist_pod1.code)
        POD2_CODE=$(cat /tmp/dist_pod2.code)
        echo "  Pod1 HTTP $POD1_CODE → $(cat /tmp/dist_pod1.json)"
        echo "  Pod2 HTTP $POD2_CODE → $(cat /tmp/dist_pod2.json)"
        echo ""

        # 驗證：兩個 pod 不能同時都是 201
        if [ "$POD1_CODE" = "201" ] && [ "$POD2_CODE" = "201" ]; then
          echo "  ❌ FAIL：兩個 pod 都回傳 201 → 分散式鎖失效！"
          exit 1
        fi
        echo "  ✅ PASS：同時並發，兩個 pod 不會都寫入成功"

        # 取得哪個 pod 取鎖成功（201 那個的 payload）
        if [ "$POD1_CODE" = "201" ]; then
          WINNER_PAYLOAD="$PAYLOAD_A"
          WINNER_URL="{{.API_URL}}"
        else
          WINNER_PAYLOAD="$PAYLOAD_B"
          WINNER_URL="{{.POD2_URL}}"
        fi

        # 等取鎖成功的 pod 完成後，用同 key 不同 payload 重試 → 應 422
        sleep 1
        echo ""
        echo "  --- 後測：同 key、不同 payload（fingerprint mismatch）→ 預期 422 ---"
        MISMATCH_R=$RANDOM
        DIFF_PAYLOAD="{\"name\":\"Mismatch-$MISMATCH_R\",\"email\":\"mismatch-$MISMATCH_R@test.com\"}"
        MISMATCH_CODE=$(curl -s -o /tmp/mismatch.json -w "%{http_code}" \
          -X POST $WINNER_URL/api/members \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $KEY" \
          -d "$DIFF_PAYLOAD")
        echo "  HTTP $MISMATCH_CODE → $(cat /tmp/mismatch.json)"
        if [ "$MISMATCH_CODE" = "422" ]; then
          echo "  ✅ PASS：fingerprint mismatch 正確回傳 422"
        else
          echo "  ❌ FAIL：預期 422，實際 HTTP $MISMATCH_CODE"
          exit 1
        fi

  test:distributed:same-payload:
    desc: |
      場景 B：相同 key、相同 payload，同時打兩個 pod
      預期：
      ・先取鎖者：201（已建立）
      ・後到者：409（InProgress 衝突）
      ・完成後用同 key 同 payload 重試：201 + X-Idempotent-Replay: true
    cmds:
      - |
        KEY="dist-same-$(date +%s)"
        R=$RANDOM
        PAYLOAD="{\"name\":\"Charlie-$R\",\"email\":\"charlie-same-$R@test.com\"}"

        echo ""
        echo "╔══════════════════════════════════════════════════════════════════╗"
        echo "║  場景 B：相同 key「$KEY」                                        ║"
        echo "║         相同 payload，同時打兩個 pod                              ║"
        echo "╚══════════════════════════════════════════════════════════════════╝"
        echo "  兩個 pod 都發送：$PAYLOAD"
        echo ""

        curl -s -o /tmp/dist_same1.json -w "%{http_code}" \
          -X POST {{.API_URL}}/api/members \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $KEY" \
          -d "$PAYLOAD" > /tmp/dist_same1.code &
        PID1=$!

        curl -s -o /tmp/dist_same2.json -w "%{http_code}" \
          -X POST {{.POD2_URL}}/api/members \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $KEY" \
          -d "$PAYLOAD" > /tmp/dist_same2.code &
        PID2=$!

        wait $PID1 $PID2

        POD1_CODE=$(cat /tmp/dist_same1.code)
        POD2_CODE=$(cat /tmp/dist_same2.code)
        echo "  Pod1 HTTP $POD1_CODE → $(cat /tmp/dist_same1.json)"
        echo "  Pod2 HTTP $POD2_CODE → $(cat /tmp/dist_same2.json)"
        echo ""

        if [ "$POD1_CODE" = "201" ] && [ "$POD2_CODE" = "201" ]; then
          # 兩個都 201 時，需確認 ID 是否相同
          # 若相同 → Pod2 在 Pod1 完成後讀到 Completed 狀態並重播，屬正確冪等行為
          # 若不同 → 分散式鎖失效，兩筆資料被寫入
          POD1_ID=$(cat /tmp/dist_same1.json | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          POD2_ID=$(cat /tmp/dist_same2.json | grep -o '"[Ii]d":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ "$POD1_ID" = "$POD2_ID" ] && [ -n "$POD1_ID" ]; then
            echo "  ✅ PASS：兩個 pod 都回傳 201，但 ID 相同（$POD1_ID）"
            echo "     → Pod2 在 Pod1 完成後讀到 Completed 並重播，屬正確冪等行為"
          else
            echo "  ❌ FAIL：兩個 pod 都回傳 201 且 ID 不同（Pod1=$POD1_ID, Pod2=$POD2_ID）"
            echo "     → 分散式鎖失效，資料已重複寫入！"
            exit 1
          fi
        else
          CODES="${POD1_CODE}_${POD2_CODE}"
          if [ "$CODES" = "201_409" ] || [ "$CODES" = "409_201" ]; then
            echo "  ✅ PASS：先到者 201，後到者 409（InProgress 衝突）"
          else
            echo "  ⚠️  非預期的組合：Pod1=$POD1_CODE, Pod2=$POD2_CODE"
            echo "     （可能時序極近造成兩個 409，視為通過，因為都未重複寫入）"
          fi
        fi

        # 等待 Completed 後重播測試
        sleep 1
        echo ""
        echo "  --- 重播測試：完成後同 key + 同 payload → 預期 201 + X-Idempotent-Replay: true ---"
        curl -s -D /tmp/replay_headers.txt -o /tmp/replay_body.json \
          -X POST {{.API_URL}}/api/members \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $KEY" \
          -d "$PAYLOAD"

        REPLAY_CODE=$(awk 'NR==1{print $2}' /tmp/replay_headers.txt | tr -d '\r')
        REPLAY_FLAG=$(grep -i "X-Idempotent-Replay" /tmp/replay_headers.txt | awk -F': ' '{print $2}' | tr -d '\r')
        echo "  HTTP $REPLAY_CODE，X-Idempotent-Replay: $REPLAY_FLAG"
        echo "  Body: $(cat /tmp/replay_body.json)"

        if [ "$REPLAY_CODE" = "201" ] && [ "$REPLAY_FLAG" = "true" ]; then
          echo "  ✅ PASS：冪等重播正確回傳 201 + X-Idempotent-Replay: true"
        else
          echo "  ❌ FAIL：預期 201 + replay=true，實際 HTTP=$REPLAY_CODE, flag=$REPLAY_FLAG"
          exit 1
        fi
