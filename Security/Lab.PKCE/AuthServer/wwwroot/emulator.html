<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA PKCE 與 CSP 安全模擬器</title>
    <style>
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444;
            --bg: #f3f4f6; --surface: #ffffff; --text: #1f2937; --border: #e5e7eb;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1, h2, h3 { margin-top: 0; color: #111827; }
        h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 4px; background-color: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        button:hover:not(:disabled) { transform: translateY(-1px); }
        .btn-danger { background-color: var(--danger); }
        .state-box { background: var(--bg); padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 15px; }
        .toggle-container { display: flex; align-items: center; justify-content: space-between; background: #fffbeb; border: 1px solid #fde68a; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }
        .console { background: #1e1e1e; color: #a7f3d0; padding: 15px; border-radius: 4px; font-family: monospace; height: 300px; overflow-y: auto; font-size: 0.85rem; }
        .log-error { color: #fca5a5; } .log-warn { color: #fde047; } .log-sys { color: #9ca3af; }
        .login-form { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 12px; margin-bottom: 10px; }
        .login-form.visible { display: block; }
        .login-form label { font-size: 0.85rem; font-weight: bold; display: block; margin-bottom: 2px; color: #374151; }
        .login-form input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; font-size: 0.9rem; }
        .hint { font-size: 0.78rem; color: #6b7280; margin-bottom: 8px; }
        .csp-status { font-size: 0.78rem; color: #92400e; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPA 安全架構模擬器 (PKCE + CSP)</h1>
        <div class="card">
            <h2>控制台</h2>
            <div class="toggle-container">
                <span style="font-weight: bold;">🛡️ 啟用真正的 CSP Header</span>
                <label class="switch">
                    <input type="checkbox" id="cspToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="csp-status" id="cspStatus"></div>
            <button id="btnPkce">1. 產生 PKCE 密語</button>
            <div id="loginForm" class="login-form">
                <label for="inputUsername">帳號</label>
                <input type="text" id="inputUsername" placeholder="alice 或 bob">
                <label for="inputPassword">密碼</label>
                <input type="password" id="inputPassword" placeholder="輸入密碼">
                <div class="hint">測試帳號：alice / password123　或　bob / password456</div>
            </div>
            <button id="btnAuth" disabled>2. 登入並取得授權碼 (Code)</button>
            <button id="btnToken" disabled>3. 交換存取憑證 (Token)</button>
            <button id="btnMe" disabled>4. 呼叫受保護 API（/api/me）</button>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border);">
            <button id="btnXss" class="btn-danger" disabled>😈 模擬 XSS 竊取 Token</button>

            <h3 style="margin-top: 15px; font-size: 0.9rem;">記憶體狀態 (不存於 localStorage)</h3>
            <div class="state-box">
                <strong>登入身分：</strong> <span id="valUser" style="color:#7c3aed">-</span><br>
                <strong>Verifier:</strong> <span id="valVerifier" style="color:var(--primary)">-</span><br>
                <strong>Token:</strong> <span id="valToken" style="color:var(--success)">-</span>
            </div>
            <button id="btnLogout" class="btn-danger" style="margin-bottom:0;" disabled>登出</button>
        </div>
        <div class="card">
            <h2>系統日誌</h2>
            <div class="console" id="consoleLog"></div>
        </div>
    </div>
    <script src="/emulator.js" defer></script>
</body>
</html>
